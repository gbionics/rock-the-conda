name: Build conda packages

on:
  workflow_dispatch:
  pull_request:

env:
  # Change to 'true' to ignore cache and force a full rebuild, but please restore to 'false' before merging
  IGNORE_CACHE_AND_DO_FULL_REBUILD: 'false'
  # This env variable triggers the GHA cache support in sccache
  SCCACHE_GHA_ENABLED: "on"
  # If true, upload the packages to the matrix-specified target channel
  ROCK_THE_CONDA_UPLOAD_PACKAGES: "false"

jobs:  
  build-packages:
    name: '[pixi:build-packages:${{ matrix.job_name }}]'
    runs-on: ${{ matrix.runs_on }}
    # The default value of this is 360, we keep it large as rocm builds can take a long time
    timeout-minutes: 3600
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: 'build-strix-packages'
            runs_on: [self-hosted, linux, x64, amdgpu]
            folder_cache: 'output/linux-64'

    steps:
    - uses: actions/checkout@v6

    - name: Set up pixi
      uses: prefix-dev/setup-pixi@v0.9.4
      with:
        # In the gb-located strix halo self-hosted runner getting the cache is slow, so it is just faster to
        # avoid donwloading and re-uploading the pixi cache every time
        cache: false

    - name: Print pixi info
      run: pixi info

    # this is the cache of conda packages
    - name: Restore cache of conda packages
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ matrix.folder_cache }}
        key: ${{ matrix.job_name }}-conda-pkgs-cache
        # allow a later run to pick up a cache that has an extra suffix
        restore-keys: |
          ${{ matrix.job_name }}-conda-pkgs-cache

    - name: Optional force full rebuild
      if: ${{ env.IGNORE_CACHE_AND_DO_FULL_REBUILD == 'true' }}
      shell: bash -l {0}
      run: |
        rm -rf ${{ matrix.folder_cache }}/*

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Build packages
      run: pixi run build-packages

    - name: Save build cache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: |
          ${{ matrix.folder_cache }}
        key: ${{ matrix.job_name }}-conda-pkgs-cache-${{ github.run_id }}-${{ github.run_attempt }}

    - name: Upload packages
      if: ${{ env.ROCK_THE_CONDA_UPLOAD_PACKAGES == 'true' }}
      env:
        ROCK_THE_CONDA_PREFIX_DEV_TOKEN: ${{ secrets.ROCK_THE_CONDA_STRIX_PREFIX_DEV_TOKEN }}
      run: pixi run upload-all
