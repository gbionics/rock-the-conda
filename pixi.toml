build-rocthrust = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocthrust", depends-on = ["build-hip", "build-rocm-core", "build-rocprim"], outputs = ["output/linux-64/rocthrust-*.conda"] }
build-rocm-jax-plugin-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocm-jax-plugin", outputs = ["output/linux-64/jax-rocm7-plugin-*.conda"] }
build-rocm-jax-plugin = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocm-jax-plugin", depends-on = ["build-hip", "build-rocm-core", "build-rocblas-no-deps", "build-hipblas-no-deps", "build-hipblas-common", "build-rocsolver-no-deps", "build-hipsolver", "build-rocfft", "build-hipfft", "build-miopen", "build-rocrand", "build-hiprand", "build-roctracer", "build-rocsparse", "build-hipsparse", "build-rocprofiler-sdk", "build-rccl", "build-hipblaslt-no-deps", "build-rocprim", "build-hipcub"], outputs = ["output/linux-64/jax-rocm7-plugin-*.conda"] }
build-packages = { cmd = "echo 'All packages build'", depends-on = ["build-rocm-core", "build-rocm-cmake", "build-rocm-devices-libs", "build-hip", "build-rocm-smi", "build-all-rattler-build-libraries", "build-pytorch", "build-torchvision", "build-torchcodec"] }
bump-version = { cmd = "python", args = ["recipes/bump_version.py"] }

# External feedstocks for pytorch enablement.
download-triton-feedstock = { cmd = "mkdir -p feedstocks && (test -d ./feedstocks/triton-feedstock/.git || git clone $TRITON_FEEDSTOCK_REPO ./feedstocks/triton-feedstock) && git -C ./feedstocks/triton-feedstock fetch --all --tags && git -C ./feedstocks/triton-feedstock checkout $TRITON_FEEDSTOCK_COMMIT" }
download-libmagma-feedstock = { cmd = "mkdir -p feedstocks && (test -d ./feedstocks/libmagma-feedstock/.git || git clone $LIBMAGMA_FEEDSTOCK_REPO ./feedstocks/libmagma-feedstock) && git -C ./feedstocks/libmagma-feedstock fetch --all --tags && git -C ./feedstocks/libmagma-feedstock checkout $LIBMAGMA_FEEDSTOCK_COMMIT" }
download-pytorch-cpu-feedstock = { cmd = "mkdir -p feedstocks && (test -d ./feedstocks/pytorch-cpu-feedstock/.git || git clone $PYTORCH_CPU_FEEDSTOCK_REPO ./feedstocks/pytorch-cpu-feedstock) && git -C ./feedstocks/pytorch-cpu-feedstock fetch --all --tags && git -C ./feedstocks/pytorch-cpu-feedstock checkout $PYTORCH_CPU_FEEDSTOCK_COMMIT" }
download-torchvision-feedstock = { cmd = "mkdir -p feedstocks && (test -d ./feedstocks/torchvision-feedstock/.git || git clone $TORCHVISION_FEEDSTOCK_REPO ./feedstocks/torchvision-feedstock) && git -C ./feedstocks/torchvision-feedstock fetch --all --tags && git -C ./feedstocks/torchvision-feedstock checkout $TORCHVISION_FEEDSTOCK_COMMIT" }
download-torchcodec-feedstock = { cmd = "mkdir -p feedstocks && (test -d ./feedstocks/torchcodec-feedstock/.git || git clone $TORCHCODEC_FEEDSTOCK_REPO ./feedstocks/torchcodec-feedstock) && git -C ./feedstocks/torchcodec-feedstock fetch --all --tags && git -C ./feedstocks/torchcodec-feedstock checkout $TORCHCODEC_FEEDSTOCK_COMMIT" }
build-triton-feedstock = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./feedstocks/triton-feedstock/recipe", depends-on = ["download-triton-feedstock"], outputs = ["output/linux-64/triton-*.conda"] }
build-libmagma-feedstock = { cmd = "conda-build $CONDA_BUILD_ARGS ./feedstocks/libmagma-feedstock/recipe", depends-on = ["download-libmagma-feedstock"], outputs = ["output/linux-64/*magma*.conda"] }
build-pytorch = { cmd = "conda-build $CONDA_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml ./feedstocks/pytorch-cpu-feedstock/recipe", depends-on = ["download-pytorch-cpu-feedstock", "build-triton-feedstock", "build-libmagma-feedstock"], outputs = ["output/linux-64/pytorch-*.conda"] }
build-pytorch-no-deps = { cmd = "conda-build $CONDA_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml ./feedstocks/pytorch-cpu-feedstock/recipe"}
build-torchvision-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml --recipe-dir ./feedstocks/torchvision-feedstock/recipe", outputs = ["output/linux-64/torchvision-*.conda"] }
build-torchvision = { cmd = "rattler-build build $RATTLER_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml --recipe-dir ./feedstocks/torchvision-feedstock/recipe", depends-on = ["download-torchvision-feedstock", "build-pytorch"], outputs = ["output/linux-64/torchvision-*.conda"] }
build-torchcodec-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml --recipe-dir ./feedstocks/torchcodec-feedstock/recipe", outputs = ["output/linux-64/torchcodec-*.conda"] }
build-torchcodec = { cmd = "rattler-build build $RATTLER_BUILD_ARGS -m ./pytorch/conda_build_config.yaml -m ./feedstocks/pytorch-cpu-feedstock/recipe/conda_build_config.yaml --recipe-dir ./feedstocks/torchcodec-feedstock/recipe", depends-on = ["download-torchcodec-feedstock", "build-pytorch"], outputs = ["output/linux-64/torchcodec-*.conda"] }

clean = "rm -rf feedstocks conda-bld"
# Upload all build packages to rock-the-conda channel, needs pixi auth login before
upload-all = { cmd = "python recipes/upload_all.py" }

# Tasks for building TheRock inside a conda environment with conda compilers
download-therock-all = { cmd = "python ./build_tools/fetch_sources.py", cwd = "TheRock", depends-on = ["download-therock-base"] }
configure-therock = { cmd = "cmake -Bbuild -GNinja . -DTHEROCK_AMDGPU_FAMILIES=gfx110X-dgpu", cwd = "TheRock"}
build-therock = { cmd = "cmake --build build", cwd = "TheRock", depends-on = ["configure-therock"]}

[dependencies]
matplotlib = "*"
networkx = "*"
pydot = "*"
cmake = "*"
cxx-compiler = "*"
graphviz = "*"
pkg-config = "*"

vcs2l = "*"
ccache = "*"
sccache = "*"

# commented as it is also a dep from TheRock's requirements.txt, but
# it is also used by our scripts
# pyyaml = "*"


# deps from https://github.com/ROCm/TheRock/blob/3da875b94df9205656c200ff1f47afe0b25afc2b/requirements.txt
pyyaml = "6.0.2.*"

cppheaderparser = ">=2.7.4"
python-build = ">=1.2.2"
meson = ">=1.7.0"
setuptools = ">=80.9.0"

# hipBLASLt deps
joblib = ">=1.4.2"
msgpack-python = ">=1.1.0"

# AWS Redshift connector
redshift_connector = "*"

# Deps for building packages
conda-build = "*"
# rattler-build 0.62.0 broke the usage of ROCK_THE_CONDA_ROCM_GPU_TARGETS env vars to set archs,
# we need to devise a better mechanism but for now let's just use rattler-build<0.62.0
rattler-build = ">=0.58.2,<0.62.0"
conda-forge-pinning = "*"

[target.unix.dependencies]
python-magic = ">=0.4.27"

[environments]
default = ["strix-archs"]
all-archs = ["all-archs"]
