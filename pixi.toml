[workspace]
authors = ["Silvio Traversaro <silvio.traversaro@gbionics.ai>"]
channels = ["https://prefix.dev/conda-forge"]
name = "rocktheconda"
platforms = ["linux-64", "win-64"]

[activation.env]
# We use sccache for C and C++, and HIP as ccache does not support HIP caching and mixing ccache and sccache does not work well with HIP workloads
# Note that ccache can create problem of cross-talking across pixi workspaces, so make sure that in this case you only use
# ccache with this pixi workspace
CMAKE_C_COMPILER_LAUNCHER = "sccache"
CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
CMAKE_HIP_COMPILER_LAUNCHER = "sccache"
# The tritron and pytorch recipes are quite complex, so keep them as proper forks
# to simplify rebasing on latest versions of the feedstock
TRITON_FEEDSTOCK_REPO = "https://github.com/gbionics/triton-feedstock"
TRITON_FEEDSTOCK_COMMIT = "rocm"
LIBMAGMA_FEEDSTOCK_REPO = "https://github.com/gbionics/libmagma-feedstock"
LIBMAGMA_FEEDSTOCK_COMMIT = "rocm"
PYTORCH_CPU_FEEDSTOCK_REPO = "https://github.com/gbionics/pytorch-cpu-feedstock"
PYTORCH_CPU_FEEDSTOCK_COMMIT = "rocm"
TORCHVISION_FEEDSTOCK_REPO = "https://github.com/gbionics/torchvision-feedstock"
TORCHVISION_FEEDSTOCK_COMMIT = "rocm"
TORCHCODEC_FEEDSTOCK_REPO = "https://github.com/gbionics/torchcodec-feedstock"
TORCHCODEC_FEEDSTOCK_COMMIT = "rocm"
CONDA_BLD_PATH = "$PIXI_PROJECT_ROOT/output"


[feature.strix-archs.activation.env]
ROCK_THE_CONDA_TARGET_CHANNEL = "https://prefix.dev/rock-the-conda-strix"
ROCK_THE_CONDA_ROCM_GPU_TARGETS = "gfx1150;gfx1151"
CONDA_BUILD_ARGS = "-c https://prefix.dev/rock-the-conda-strix -c conda-forge -c local --skip-existing -m ./conda_forge_pinnings/conda_build_config.yaml -m ./recipes/conda_build_config.yaml --output-folder ./output"
RATTLER_BUILD_ARGS = "-c https://prefix.dev/rock-the-conda-strix -c conda-forge --skip-existing=all -m ./conda_forge_pinnings/conda_build_config.yaml -m ./recipes/conda_build_config.yaml --no-build-id --experimental"

[feature.all-archs.activation.env]
ROCK_THE_CONDA_TARGET_CHANNEL = "https://prefix.dev/rock-the-conda"
# If you modify this list, remember to also modify the parallel list in recipes/hip/activate/hip-clang_activate.sh
ROCK_THE_CONDA_ROCM_GPU_TARGETS ="gfx908;gfx90a;gfx942;gfx950;gfx1030;gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"
CONDA_BUILD_ARGS = "-c https://prefix.dev/rock-the-conda -c conda-forge -c local  --skip-existing -m ./conda_forge_pinnings/conda_build_config.yaml -m ./recipes/conda_build_config.yaml --output-folder ./output"
RATTLER_BUILD_ARGS = "-c https://prefix.dev/rock-the-conda -c conda-forge --skip-existing=all -m ./conda_forge_pinnings/conda_build_config.yaml -m ./recipes/conda_build_config.yaml --no-build-id --experimental"

[tasks]
download-therock-base = "git clone https://github.com/ROCm/TheRock"
download-therock = { cmd = "git submodule update --init ./rocm-systems", cwd = "TheRock", depends-on = ["download-therock-base"] }
extract-deps = "python extract_the_rock_deps.py TheRock"
extract-deps-with-external = "python extract_the_rock_deps.py TheRock --include-external"

# Serialize dependency graph manually to avoid conda-build getting confused and permit to mix conda-build and rattler-build
print-conda-build-args = { cmd = "echo 'CONDA_BUILD_ARGS: '$CONDA_BUILD_ARGS" }
build-rocm-core = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocm-core", depends-on = ["print-conda-build-args"], outputs = ["output/linux-64/rocm-core-*.conda"] }
build-rocm-cmake = { cmd = "find output/linux-64 -name 'rocm-cmake-*.conda' | grep -q . && echo 'Skipping build-rocm-cmake: output already exists' || conda-build $CONDA_BUILD_ARGS ./recipes/rocm-cmake", depends-on = ["build-rocm-core", "print-conda-build-args"], outputs = ["output/linux-64/rocm-cmake-*.conda"] }
build-rocm-devices-libs = { cmd = "find output/linux-64 -name 'rocm-device-libs-*.conda' | grep -q . && echo 'Skipping build-rocm-devices-libs: output already exists' || conda-build ./recipes/rocm-device-libs $CONDA_BUILD_ARGS", depends-on = ["build-rocm-core"], outputs = ["output/linux-64/rocm-device-libs-*.conda"] }
build-rocm-comgr = { cmd = "find output/linux-64 -name 'rocm-comgr-*.conda' | grep -q . && echo 'Skipping build-rocm-comgr: output already exists' || conda-build ./recipes/rocm-comgr $CONDA_BUILD_ARGS", depends-on = ["build-rocm-core", "build-rocm-devices-libs"], outputs = ["output/linux-64/rocm-comgr-*.conda"] }
build-rocr-runtime = { cmd = "find output/linux-64 -name 'rocr-runtime-*.conda' | grep -q . && echo 'Skipping build-rocr-runtime: output already exists' || conda-build ./recipes/rocr-runtime $CONDA_BUILD_ARGS", depends-on = ["build-rocm-core", "build-rocm-devices-libs"], outputs = ["output/linux-64/rocr-runtime-*.conda"] }
build-rocminfo = { cmd = "find output/linux-64 -name 'rocminfo-*.conda' | grep -q . && echo 'Skipping build-rocminfo: output already exists' || conda-build ./recipes/rocminfo $CONDA_BUILD_ARGS", depends-on = ["build-rocr-runtime", "build-rocm-core"], outputs = ["output/linux-64/rocminfo-*.conda"] }
build-rocminfo-no-deps = { cmd = "conda-build ./recipes/rocminfo $CONDA_BUILD_ARGS", outputs = ["output/linux-64/rocminfo-*.conda"] }
build-hip-no-deps = { cmd = "conda-build ./recipes/hip $CONDA_BUILD_ARGS", outputs = ["output/linux-64/hip-*.conda"] }
build-hip = { cmd = "find output/linux-64 -name 'hip-*.conda' | grep -q . && echo 'Skipping build-hip: output already exists' || conda-build ./recipes/hip $CONDA_BUILD_ARGS", depends-on = ["build-rocm-core", "build-rocminfo", "build-rocr-runtime", "build-rocm-comgr"], outputs = ["output/linux-64/hip-*.conda"] }
build-rocm-smi-no-deps = { cmd = "conda-build ./recipes/rocm-smi $CONDA_BUILD_ARGS", outputs = ["output/linux-64/rocm-smi-*.conda"] }
build-rocm-smi = { cmd = "find output/linux-64 -name 'rocm-smi-*.conda' | grep -q . && echo 'Skipping build-rocm-smi: output already exists' || conda-build ./recipes/rocm-smi $CONDA_BUILD_ARGS", depends-on = ["build-rocm-core", "build-rocminfo", "build-rocr-runtime"], outputs = ["output/linux-64/rocm-smi-*.conda"] }
build-all-rattler-build-libraries-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes" }
build-rocwmma-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocwmma", outputs = ["output/linux-64/rocwmma-*.conda"] }
build-rocwmma = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocwmma", depends-on = ["build-hip", "build-rocm-core", "build-rocm-cmake"], outputs = ["output/linux-64/rocwmma-*.conda"] }
build-all-rattler-build-libraries = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes", depends-on = ["build-rocm-core", "build-hip", "build-rocminfo", "build-rocr-runtime", "build-rocm-comgr", "build-rocmlir", "build-migraphx"] }
build-rocprim-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprim", outputs = ["output/linux-64/rocprim-*.conda"] }
build-rocprim = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprim", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/rocprim-*.conda"] }
build-rocfft-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocfft", outputs = ["output/linux-64/rocfft-*.conda"] }
build-rocfft = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocfft", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/rocfft-*.conda"] }
build-hipfft = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipfft", depends-on = ["build-hip", "build-rocm-core", "build-rocfft"], outputs = ["output/linux-64/hipfft-*.conda"] }
# This task is used to build all the packages in the packages list that are buildable on a public GitHub Action node (so excluding hipblaslt and all the packages that depend on it)
build-packages-lightweight = { cmd = "echo 'Lightweight packages build'", depends-on = ["build-hipfft", "build-rocprim"] }
build-rocblas-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocblas", outputs = ["output/linux-64/rocblas-*.conda"] }
build-rocblas = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocblas", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/rocblas-*.conda"] }
build-rocsolver-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocsolver", outputs = ["output/linux-64/rocsolver-*.conda"] }
build-hipblas-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipblas", outputs = ["output/linux-64/hipblas-*.conda"] }
build-hipblas-common = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipblas-common", depends-on = ["build-rocm-core", "build-rocm-cmake"], outputs = ["output/linux-64/hipblas-common-*.conda"] }
build-hipblaslt-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipblaslt", depends-on = ["build-hipblas-common"], outputs = ["output/linux-64/hipblaslt-*.conda"] }
build-llama-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/llama.cpp", outputs = ["output/linux-64/llama-cpp-*.conda"] }
build-gotcha = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/gotcha", outputs = ["output/linux-64/gotcha-*.conda"] }
build-composable-kernel-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/composable-kernel", outputs = ["output/linux-64/composable-kernel-*.conda"] }
build-composable-kernel = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/composable-kernel", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/composable-kernel-*.conda"] }
build-rocrand-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocrand", outputs = ["output/linux-64/rocrand-*.conda"] }
build-rocrand = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocrand", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/rocrand-*.conda"] }
build-rocsparse-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocsparse", outputs = ["output/linux-64/rocsparse-*.conda"] }
build-rocsparse = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocsparse", depends-on = ["build-hip", "build-rocm-core", "build-rocprim"], outputs = ["output/linux-64/rocsparse-*.conda"] }
build-hiprand-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hiprand", outputs = ["output/linux-64/hiprand-*.conda"] }
build-hiprand = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hiprand", depends-on = ["build-hip", "build-rocm-core", "build-rocrand"], outputs = ["output/linux-64/hiprand-*.conda"] }
build-hipsparse-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipsparse", outputs = ["output/linux-64/hipsparse-*.conda"] }
build-hipsparse = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipsparse", depends-on = ["build-hip", "build-rocm-core", "build-rocsparse"], outputs = ["output/linux-64/hipsparse-*.conda"] }
build-hipsolver-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipsolver", outputs = ["output/linux-64/hipsolver-*.conda"] }
build-hipsolver = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipsolver", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/hipsolver-*.conda"] }
build-hipify = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipify", outputs = ["output/linux-64/hipify-*.conda"] }
build-rocprofiler-sdk-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprofiler-sdk", depends-on = ["build-rocprofiler-register-no-deps", "build-aqlprofile-no-deps"], outputs = ["output/linux-64/rocprofiler-sdk-*.conda"] }
build-rocprofiler-sdk = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprofiler-sdk", depends-on = ["build-hip", "build-rocm-core", "build-rocprofiler-register", "build-aqlprofile"], outputs = ["output/linux-64/rocprofiler-sdk-*.conda"] }
build-rocprofiler-register-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprofiler-register", outputs = ["output/linux-64/rocprofiler-register-*.conda"] }
build-rocprofiler-register = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocprofiler-register", depends-on = ["build-hip", "build-rocm-core", "build-rocr-runtime", "build-aqlprofile"], outputs = ["output/linux-64/rocprofiler-register-*.conda"] }
build-aqlprofile-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/aqlprofile", outputs = ["output/linux-64/aqlprofile-*.conda"] }
build-aqlprofile = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/aqlprofile", depends-on = ["build-hip", "build-rocm-core", "build-rocr-runtime"], outputs = ["output/linux-64/aqlprofile-*.conda"] }
build-rccl-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rccl", outputs = ["output/linux-64/rccl-*.conda"] }
build-rccl = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rccl", depends-on = ["build-hip", "build-rocm-core", "build-hipify"], outputs = ["output/linux-64/rccl-*.conda"] }
build-roctracer-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/roctracer", outputs = ["output/linux-64/roctracer-*.conda"] }
build-roctracer = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/roctracer", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/roctracer-*.conda"] }
build-miopen-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/miopen-hip", outputs = ["output/linux-64/miopen-*.conda"] }
build-miopen = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/miopen-hip", depends-on = ["build-hip", "build-rocblas", "build-composable-kernel", "build-rocrand"], outputs = ["output/linux-64/miopen-*.conda"] }
build-mlir-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocmlir", outputs = ["output/linux-64/rocmlir-*.conda"] }
build-rocmlir = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/rocmlir", depends-on = ["build-hip", "build-rocm-core"], outputs = ["output/linux-64/rocmlir-*.conda"] }
build-migraphx-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/migraphx", outputs = ["output/linux-64/migraphx-*.conda"] }
build-migraphx = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/migraphx", depends-on = ["build-hip", "build-rocm-core", "build-rocm-cmake", "build-rocmlir", "build-miopen", "build-composable-kernel", "build-rocblas-no-deps", "build-hipblaslt-no-deps"], outputs = ["output/linux-64/migraphx-*.conda"] }
build-onnxruntime-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/onnxruntime", outputs = ["output/linux-64/onnxruntime-*.conda"] }
build-onnxruntime = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/onnxruntime", depends-on = ["build-migraphx", "build-miopen", "build-hip", "build-rocm-core", "build-composable-kernel"], outputs = ["output/linux-64/onnxruntime-*.conda"] }
build-warp-lang-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/warp-lang", outputs = ["output/linux-64/warp-lang-*.conda"] }
build-warp-lang = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/warp-lang", depends-on = ["build-hip", "build-rocm-core", "build-composable-kernel", "build-hipcub", "build-rocthrust"], outputs = ["output/linux-64/warp-lang-*.conda"] }
build-hipcub-no-deps = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipcub", outputs = ["output/linux-64/hipcub-*.conda"] }
build-hipcub = { cmd = "rattler-build build $RATTLER_BUILD_ARGS --recipe-dir ./recipes/hipcub", depends-on = ["build-hip", "build-rocm-core", "build-rocprim"], outputs = ["output/linux-64/hipcub-*.conda"] }
