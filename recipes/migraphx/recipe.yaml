context:
  name: migraphx
  version: "7.0.2"

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/ROCm/AMDMIGraphX/archive/refs/tags/rocm-${{ version }}.tar.gz
    sha256: 33979c1d8f514d65f823f28b2cd2eb11338477403f295e6367244a3abb0abadd
    target_directory: migraphx
    patches:
      - fix-msgpack-cmake.patch
  # CK JIT library (migraphx branch) static lib only used by MIGraphX.
  - url: https://github.com/ROCm/composable_kernel/archive/b7775add2d28251674d81e220cd4a857b90b997a.tar.gz
    sha256: afaf0c55623050909e77e7f0b2d054d9371eda8fd958342c1a5c1d4aa8038ddb
    target_directory: ck-jit
    patches:
      - add-jit-library-component.patch

build:
  number: 0
  skip:
    - not linux
    - hip_compiler_version in (None, "None")

outputs:
  # Staging: build the full C++ library once and cache the work directory.
  # The compiled objects are reused by both libmigraphx and migraphx-python.
  - staging:
      name: ${{ name }}-build
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
        - ${{ compiler('hip') }}
        - cmake
        - ninja
        - msgpack-cxx
        - openmpi
      host:
        - rocm-core ${{ version }}.*
        - rocm-cmake
        - rocblas
        - openmpi
        - miopen-hip
        - hipblaslt
        - hipblas
        - hipblas-common
        - composable-kernel
        - cpp-half
        - nlohmann_json
        - msgpack-cxx
        - sqlite
        - rocmlir
        - libprotobuf
        - libboost-devel
    build:
      script: build-lib.sh

  # C++ library: inherits all files from the staging build (no build script).
  - package:
      name: lib${{ name }}
    inherit: ${{ name }}-build
    requirements:
      run:
        - cpp-half
        - nlohmann_json
        - msgpack-cxx
        - sqlite
        - libprotobuf
      run_exports:
        - ${{ pin_subpackage('lib' ~ name, upper_bound="x.x") }}
    tests:
      - package_contents:
          include:
            - migraphx/migraphx.h
            - migraphx/migraphx.hpp
          lib:
            - libmigraphx_c.so

  # Python bindings: inherits the staging work directory and does an
  # incremental cmake build with MIGRAPHX_ENABLE_PYTHON=ON.
  - package:
      name: ${{ name }}-python
    inherit: ${{ name }}-build
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - ${{ compiler('cxx') }}
        - ${{ compiler('hip') }}
        - cmake
        - ninja
        - python
        - msgpack-cxx
        - openmpi
      host:
        - rocm-core ${{ version }}.*
        - rocm-cmake
        - rocblas
        - openmpi
        - miopen-hip
        - hipblaslt
        - hipblas
        - hipblas-common
        - composable-kernel
        - cpp-half
        - nlohmann_json
        - msgpack-cxx
        - sqlite
        - rocmlir
        - libprotobuf
        - libboost-devel
        - python
        - pybind11
      run:
        - python
        - ${{ pin_subpackage('lib' ~ name, upper_bound="x.x") }}
    build:
      script: build-py.sh
      files:
        - lib/libmigraphx_py*
        - lib/migraphx.cpython*
    tests:
      - package_contents:
          lib:
            - libmigraphx_py.so

  # Metapackage pulling both C++ library and Python bindings.
  - package:
      name: ${{ name }}
    requirements:
      run:
        - ${{ pin_subpackage('lib' ~ name, exact=True) }}
        - ${{ pin_subpackage(name ~ '-python', upper_bound="x.x.x") }}

about:
  repository: https://github.com/ROCm/AMDMIGraphX
  license: MIT
  license_file: migraphx/LICENSE
  summary: "AMD's graph optimization engine for machine learning inference"
  description: |
    MIGraphX is AMD's graph inference engine that accelerates machine learning
    model inference. It provides graph optimization and compilation for efficient
    execution of deep learning models on AMD GPUs using the HIP programming model.

extra:
  recipe-maintainers:
    - flferretti
    - conda-forge/rocm-core
