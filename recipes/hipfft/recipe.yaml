context:
  name: hipfft
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: "https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/hipfft.tar.gz"
    sha256: 2aadd7801852a8baa9333e8370dc04f6737aaf7b85dcc94b4d19a57867780d1a

build:
  number: 0
  skip: 
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    # Workaround for https://github.com/conda-forge/ctng-compiler-activation-feedstock/issues/182
    - libstdcxx-devel_linux-64 >=15
    - ${{ compiler('hip') }}
    - cmake
    - pkg-config
    - ninja
  host:
    - rocm-core ${{ version }}.*
    - rocm-cmake
    - rocfft
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}

tests:
  # Needs hip-devel
  #- requirements:
  #    run:
  #      - cmake-package-check
  #      - ${{ compiler('c') }}
  #      - ${{ compiler('cxx') }}
  #  script:
  #    - cmake-package-check hipfft
  - package_contents:
      include:
        - hipfft/hipfft.h
      lib:
        - hipfft

about:
  homepage: https://rocm.docs.amd.com/projects/hipFFT
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: "hipFFT is an FFT marshalling library."

extra:
  recipe-maintainers:
    - traversaro