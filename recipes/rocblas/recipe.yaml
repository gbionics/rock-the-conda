context:
  name: rocblas
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: "https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/rocblas.tar.gz"
    sha256: c55bc74e2a2c9f1b6cf23c586c391787a8198826a85d72e2e1358e6259299578
    target_directory: projects/rocblas
  - url: "https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/tensile.tar.gz"
    sha256: 61007dbacaf70b4f7c048e7e1435871028da83bcf63674909634c5ae6848d781
    target_directory: shared/tensile


build:
  number: 0
  skip: 
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('hip') }}
    - cmake
    - pkg-config
    - ninja
    # Needed for tensilite
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - msgpack-python
    - joblib
    - pyyaml
    - packaging
  host:
    - rocm-core ${{ version }}.*
    - rocm-cmake
    - rocm-smi
    - roctracer
    - hipblas-common
    - hipblaslt
    # Needed for tensilite
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - msgpack-cxx
    - libboost-devel
    - msgpack-python
    - joblib
    - pyyaml
    - packaging
    - rocm-smi
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}
  ignore_run_exports:
    # Ignoring as these are test-only dependencies
    from_package:
      - python

tests:
  #- requirements:
  #    run:
  #      - cmake-package-check
  #      - ${{ compiler('c') }}
  #      - ${{ compiler('cxx') }}
  #  script:
  #    - cmake-package-check rocblas
  - package_contents:
      include:
        - rocblas/rocblas.h
      lib:
        - rocblas

about:
  homepage: https://rocm.docs.amd.com/projects/rocBLAS
  license: MIT
  license_family: MIT
  license_file: projects/rocblas/LICENSE.md
  summary: "rocBLAS is the AMD library for BLAS in ROCm. Implemented using the HIP language and optimized for AMD GPUs."

extra:
  recipe-maintainers:
    - traversaro
