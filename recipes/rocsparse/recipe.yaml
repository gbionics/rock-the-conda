context:
  name: rocsparse
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/rocsparse.tar.gz
  sha256: ef168ca552cae6d4394d0a9a9b8a6e0dd866623d768bba897c31e1d4b5207d13

build:
  number: 0
  skip:
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    # Workaround for https://github.com/conda-forge/ctng-compiler-activation-feedstock/issues/182
    - libstdcxx-devel_linux-64 >=15
    - libgcc-devel_linux-64 >=15.2.0
    - ${{ compiler('hip') }}
    - cmake
    - ninja
  host:
    - rocm-core ${{ version }}.*
    - rocm-cmake
    - rocprim
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - rocsparse/rocsparse.h
      lib:
        - librocsparse${{ dso_ext }}

about:
  repository: https://github.com/ROCm/rocSPARSE
  homepage: https://rocm.docs.amd.com/projects/rocSPARSE/en/latest/
  license: MIT
  license_file: LICENSE.md
  summary: "ROCm SPARSE linear algebra library"
  description: |
    rocSPARSE is a library that contains basic linear algebra subroutines for sparse
    matrices and vectors written in HIP for GPU devices. It is designed to be used
    from C and C++ code.

extra:
  recipe-maintainers:
    - flferretti
    - conda-forge/rocm-core
