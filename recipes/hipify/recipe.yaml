context:
  name: hipify
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ROCm/HIPIFY/archive/refs/tags/rocm-${{ version }}.tar.gz
  sha256: 1d5504a69024491c582e224445df4c917b0b5ee3b0830c0909119eca97b70e9f
  patches:
    - fix-llvm-diagnosticoptions.patch

build:
  number: 0
  skip:
    - not linux

requirements:
  build:
    - ${{ compiler('cxx') }}
    # Workaround for https://github.com/conda-forge/ctng-compiler-activation-feedstock/issues/182
    - libstdcxx-devel_linux-64 >=15
    - libgcc-devel_linux-64 >=15.2.0
    - cmake
    - ninja
  host:
    - rocm-core ${{ version }}.*
    - llvmdev
    - clangdev
  run:
    - perl
    - llvm 20.*

tests:
  - script:
      - hipify-perl --help
      - hipify-clang --help

about:
  repository: https://github.com/ROCm/HIPIFY
  homepage: https://rocm.docs.amd.com/projects/HIPIFY/en/latest/
  license: MIT
  license_file: LICENSE.txt
  summary: "CUDA to HIP source translator (Perl and Clang implementations)"
  description: |
    HIPIFY provides tools to convert CUDA code to HIP code.
    This package includes both hipify-perl (Perl-based translator) and
    hipify-clang (LLVM/Clang-based translator) for comprehensive CUDA to HIP conversion.
    Used by RCCL, JAX, and other ROCm tools for porting CUDA applications.

extra:
  recipe-maintainers:
    - flferretti
    - conda-forge/rocm-core
