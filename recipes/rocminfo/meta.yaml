{% set name = "rocminfo" %}
{% set version = "7.2.1" %}



package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ROCm/rocm-systems/releases/download/rocm-{{ version }}/rocminfo.tar.gz
  sha256: 6f3235bea6b8e92460de66a7f40366d17e20ae36693324eccd3eb3fa4e75cc98
  patches:
    # Backport for https://github.com/ROCm/rocm-systems/pull/743
    - patches/743.patch
    # Backport for 
    - patches/1317.patch

build:
  number: 0
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - {{ cdt('pciutils-devel') }}
    - cmake
    - make
  host:
    - numactl
    - rocm-core {{ version }}
    - rocr-runtime {{ version }}
  run:
    - rocr-runtime {{ version }}
    - libnuma

test:
  commands:
    - test -f $PREFIX/bin/rocminfo
    - test -f $PREFIX/bin/rocm_agent_enumerator
    # GPU functional tests are in run_test.sh

about:
  home: https://github.com/ROCm/rocminfo
  license: NCSA
  license_family: MIT
  license_file: License.txt
  summary: 'ROCm Application for Reporting System Info'

extra:
  recipe-maintainers:
    - isuruf
    - zklaus
