context:
  name: hipblaslt
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: "https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/hipblaslt.tar.gz"
    sha256: d6364248679857c489244d49d5e3c606ca24bace77dd6ad7be70bccdfabf8e1b
    patches:
      - fix_latest_msgpack_cxx.patch

build:
  number: 0
  skip: 
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    # Workaround for https://github.com/conda-forge/ctng-compiler-activation-feedstock/issues/182
    - libstdcxx-devel_linux-64 >=15
    - libgcc-devel_linux-64 >=15.2.0
    - ${{ compiler('hip') }}
    # Workaround for rocroller bug, remove in the future
    - cmake<4
    - pkg-config
    - ninja
    # Needed for tensilite
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - msgpack-python
    - joblib
    - pyyaml
    - packaging
  host:
    - rocm-core ${{ version }}.*
    - rocm-cmake ${{ version }}.*
    - hipblas-common
    - roctracer
    # Needed for tensilite
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - msgpack-python
    - joblib
    - pyyaml
    - packaging
    - msgpack-cxx
    - libboost-devel
    - rocm-smi
    # Needed for rocroller
    - spdlog
    - llvmdev 20.*
    - lld 20.*
    - zlib
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}

tests:
  # Temporary commented out, find_package(hipblaslt) needs
  # hip-devel to be installed to work, but it does not make sense
  # to add that as a run dependency, unless we add a hipblaslt-devel
  # package.
  # - requirements:
  #    run:
  #      - cmake-package-check
  #      - ${{ compiler('c') }}
  #      - ${{ compiler('cxx') }}
  #  script:
  #    - cmake-package-check hipblaslt
  - package_contents:
      include:
        - hipblaslt/hipblaslt.h
      lib:
        - hipblaslt
about:
  homepage: https://rocm.docs.amd.com/projects/hipBLASLt
  repository: https://github.com/ROCm/rocm-libraries
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: "HIP library for GEMM operations with extended functionality"

extra:
  recipe-maintainers:
    - traversaro
