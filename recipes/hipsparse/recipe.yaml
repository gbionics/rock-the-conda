context:
  name: hipsparse
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ROCm/rocm-libraries/releases/download/rocm-${{ version }}/hipsparse.tar.gz
  sha256: 5292b78254d146bbceeaa799fa17e5b8a876c0e72e1a606f5c4e7e4792e9ce1f

build:
  number: 0
  skip:
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - libgcc-devel_linux-64 >=15.2.0
    - ${{ compiler('hip') }}
    - ${{ compiler('fortran') }}
    - cmake
    - ninja
  host:
    - rocm-core ${{ version }}.*
    - rocm-cmake
    - rocsparse
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - hipsparse/hipsparse.h
      lib:
        - hipsparse

about:
  repository: https://github.com/ROCm/hipSPARSE
  homepage: https://rocm.docs.amd.com/projects/hipSPARSE/en/latest/
  license: MIT
  license_file: LICENSE.md
  summary: "ROCm SPARSE marshalling library"
  description: |
    hipSPARSE is a SPARSE marshalling library with multiple supported backends.
    It sits between your application and a 'worker' SPARSE library, where it marshals
    inputs to the backend library and marshals results to the application.

extra:
  recipe-maintainers:
    - flferretti
    - conda-forge/rocm-core
