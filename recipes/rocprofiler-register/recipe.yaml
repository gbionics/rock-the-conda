context:
  name: rocprofiler-register
  version: "7.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ROCm/rocm-systems/releases/download/rocm-${{ version }}/rocprofiler-register.tar.gz
  sha256: e437efc67fecf8dc689b50667f69d6da88c509c947df2002fedb88a7176efa1a
  patches:
    - 0001-fix-fmt-find-package-order.patch
    - 0002-disable-cpackaging.patch

build:
  number: 2
  skip:
    - not linux
    - hip_compiler_version in (None, "None")

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('hip') }}
    - cmake
    - ninja
    - python ${{ python_min }}.*
  host:
    - rocm-core ${{ version }}.*
    - rocr-runtime
    - glog
    - fmt

tests:
  - package_contents:
      include:
        - rocprofiler-register/rocprofiler-register.h
      lib:
        - rocprofiler-register

about:
  repository: https://github.com/ROCm/rocm-systems
  homepage: https://rocm.docs.amd.com/projects/rocprofiler-register/en/latest/
  license: MIT
  license_file: LICENSE.md
  summary: "ROCm profiler SDK for GPU profiling and tracing"
  description: |
    rocprofiler-register is AMD's tooling infrastructure providing a hardware-specific
    low-level performance analysis interface for profiling and tracing GPU compute
    applications.

extra:
  recipe-maintainers:
    - flferretti
    - conda-forge/rocm-core
